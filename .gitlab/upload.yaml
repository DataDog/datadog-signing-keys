---
upload-linux-packages:
  stage: upload
  image: registry.ddbuild.io/ci/datadog-agent-buildimages/gitlab_agent_deploy:$CI_IMAGE_GITLAB_AGENT_DEPLOY
  tags: ["arch:amd64"]
  rules:
    - when: on_success
  variables:
    DD_PKG_ARCH: x86_64
  script:
    - dd-pkg upload "${OMNIBUS_PACKAGE_DIR}" --project-name "${PRODUCT_NAME}"
